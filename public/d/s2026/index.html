  <script type="application/json" id="speaker-notes">
[
  "Hi my name is Roger and I wanted to introduce Ultraviolet. Ultraviolet is a product delivery engine, meaning it takes customer signals and ships completed products. We're looking to raise $500K in a pre-seed round.",

  "About me: I've got over 10 years as an operator at venture-backed companies. Two of them with YC. Most recently VP Eng at Beyond Finance (>$1B revenue).",

  "In 2026 here's how we ship products. Dozens of markdown files with no structure. A human trying desperately to tell the agents what to build and to keep them from going off the rails.",

  "Agents like Claude Code and Cursor help write code faster but thats only part of shipping. The other 75% is customer interviews, prioritization, specs, planning. And these haven't gotten much faster.",

  "Humans are still gluing together a dozen tools to decide what to build and how to build it. Its still all manual work, shipping context around. And of course it still means spreadsheets.",

  "Ultraviolet bridges the gap: covering both the product lifecycle and the software lifecycle in one tool, not six or more.",

  "Here's an example of how it works: a customer interview is captured as a signal, which is then picked up as part of a pattern. A PM sees it, and spins up a project to build it. Together, the PM and the agents plan the project, decompose it it into tasks, and the agents take it from there, building it over an hour and putting up a pull request. AI helps at every step of the way, not just writing code.",

  "Here's how those phases break down: Signals come in as support tickets, call transcripts, feature requests, or other ways. Signals are bubbled up into patterns and projects. Users work with AI to plan out projects and Agents build them out in the background, running tests, and deploying features.",

  "Here's an example of UV's Discover view: notice there are custromer signals being ingested, patterns scored, and opportunities surfaced.",

  "And here's what a project looks like: tasks are auto-generated from specs, agents execute them in the background, and the PR is opened automatically.",

  "Another example: Say you're a PM at a Series A company. In the morning customer interviews are added to UV, Close to 11 you've got a fully written plan drafted. During your lunch UV agents build it, and by end of the day everything is merged to production.",

  "Obviously the market is massive, $200B+ TAM. Probably about $1B of that is immediately addressable. Product development is one of the last unautomated business processes.",

  "Lets look at the competition. There are a lots of great coding agents, but not much for further up the stack. Sure you can connect to a Linear's MCP server, but that doesn't make Linear any smarter, or shipping all that much faster.",

  "And lastly: we're looking to raise $500K with a SAFE. We'll use that to get 25 design partners translating into about $25K MRR. We think this probably 15-18 months of runway. Feel free to Thanks very much"
]
